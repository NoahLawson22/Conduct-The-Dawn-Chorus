<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Conduct The Dawn Chorus — mix looping birdsong recordings from across the UK.">
  <title>Conduct The Dawn Chorus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --sunrise-top: #f5c978;
      --sunrise-middle: #dc941c;
      --sunrise-bottom: #b96f0d;
      --ink: #3b291d;
      --ivory: #fff4d5;
      --ivory-deep: #f0d79b;
      --forest: #1f4a35;
      --forest-deep: #123426;
      --gold: #ffd878;
      --focus: #fff9e8;
      --shadow: rgba(73, 39, 8, 0.27);
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      padding: clamp(1.25rem, 3vw, 2.75rem);
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(255, 245, 198, 0.72), transparent 37%),
        linear-gradient(180deg, var(--sunrise-top) 0%, var(--sunrise-middle) 47%, var(--sunrise-bottom) 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.12;
      background-image:
        repeating-radial-gradient(circle at 0 0, rgba(66, 37, 12, 0.25) 0 0.55px, transparent 0.65px 4px),
        repeating-linear-gradient(92deg, rgba(255,255,255,0.16) 0 1px, transparent 1px 7px);
      mix-blend-mode: soft-light;
    }

    header, main, footer { position: relative; z-index: 1; }

    header { text-align: center; }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 6vw, 5.2rem);
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: 0.025em;
      text-wrap: balance;
    }

    .instructions {
      max-width: 48rem;
      margin: 1rem auto 0;
      font-size: clamp(1rem, 1.8vw, 1.2rem);
      line-height: 1.45;
      text-align: center;
    }

    main {
      flex: 1;
      width: 100%;
      display: grid;
      place-items: center;
      padding: clamp(2.5rem, 6vw, 5rem) 0;
    }


    .choir-control {
      width: min(100%, 76rem);
      display: grid;
      justify-items: center;
      margin-bottom: clamp(1.6rem, 3vw, 2.6rem);
    }

    .bird-grid {
      width: min(100%, 76rem);
      display: grid;
      grid-template-columns: repeat(5, minmax(9.5rem, 1fr));
      gap: clamp(1.6rem, 3vw, 2.8rem);
      align-items: start;
    }

    .bird-row { display: contents; }

    .bird-control {
      min-width: 0;
    }

    .bird-cell {
      display: grid;
      justify-items: center;
      gap: 0.75rem;
      min-width: 0;
    }

    .bird-button {
      width: min(100%, 9.25rem);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1.5px solid rgba(59, 41, 29, 0.5);
      color: var(--ink);
      cursor: pointer;
      padding: 1rem 0.7rem;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 0.35rem;
      font: inherit;
      background:
        radial-gradient(circle at 42% 23%, rgba(255,255,255,0.96) 0 6%, transparent 7%),
        radial-gradient(circle at 45% 32%, #fffaf0 0%, var(--ivory) 51%, var(--ivory-deep) 100%);
      box-shadow:
        0 0.85rem 1.45rem var(--shadow),
        inset 0 2px 4px rgba(255,255,255,0.92),
        inset 0 -4px 8px rgba(126, 73, 17, 0.13);
      transition: transform 180ms ease, color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .bird-button:hover { transform: translateY(-4px); }

    .bird-button:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 4px;
    }

    .bird-button[aria-pressed="true"] {
      color: var(--focus);
      transform: scale(0.965);
      background:
        radial-gradient(circle at 42% 23%, rgba(255,255,255,0.25) 0 5%, transparent 6%),
        radial-gradient(circle at 45% 32%, #356f50 0%, var(--forest) 58%, var(--forest-deep) 100%);
      box-shadow:
        0 0 0.9rem rgba(255, 216, 120, 0.92),
        0 0 2rem rgba(255, 216, 120, 0.55),
        inset 0 3px 9px rgba(0,0,0,0.24);
    }

    .bird-icon {
      width: 4.8rem;
      height: 3.8rem;
      overflow: visible;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .bird-name {
      font-size: 1.16rem;
      line-height: 1.02;
      font-weight: 600;
      text-align: center;
    }


    .volume-control {
      width: min(100%, 30rem);
      margin: 2.25rem auto 0;
      display: grid;
      grid-template-columns: auto minmax(10rem, 1fr) auto;
      align-items: center;
      gap: 0.85rem;
      font-size: clamp(1rem, 1.8vw, 1.15rem);
      font-weight: 600;
    }

    .volume-control input[type="range"] {
      width: 100%;
      accent-color: var(--forest);
      cursor: pointer;
    }

    .volume-value {
      min-width: 3.5ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 420px) {
      .volume-control {
        grid-template-columns: 1fr auto;
      }

      .volume-control label {
        grid-column: 1 / -1;
      }
    }

    footer {
      text-align: center;
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      line-height: 1.45;
      padding-top: 1rem;
    }

    .status {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 980px) {
      .bird-grid {
        grid-template-columns: repeat(3, minmax(8.5rem, 1fr));
        max-width: 42rem;
      }
    }

    @media (max-width: 540px) {
      body { padding: 1.2rem; }
      .bird-grid {
        grid-template-columns: repeat(2, minmax(8rem, 1fr));
        gap: 1.5rem 1rem;
      }
      .bird-button { width: min(100%, 8.5rem); }
    }

    @media (max-width: 350px) {
      .bird-grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>

  <script>
    const players = new Map();
    const volumeSlider = document.querySelector('#master-volume');
    const volumeValue = document.querySelector('#volume-value');
    const fullChoirButton = document.querySelector('#full-choir-button');

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    const canUsePanning =
      Boolean(AudioContextClass) &&
      location.protocol !== 'file:';

    let audioContext = null;
    let masterGain = null;
    let fullChoirActive = false;

    function speciesKey(audioPath) {
      return audioPath.split('/').pop().replace(/\.wav$/i, '');
    }

    function getAudioContext() {
      if (!canUsePanning) return null;

      if (!audioContext) {
        audioContext = new AudioContextClass();
        masterGain = audioContext.createGain();
        masterGain.gain.value = Number(volumeSlider.value) / 100;
        masterGain.connect(audioContext.destination);
      }

      return audioContext;
    }

    async function resumeAudioContext() {
      const context = getAudioContext();

      if (context && context.state === 'suspended') {
        await context.resume();
      }
    }

    function connectPlayer(player) {
      if (!canUsePanning || player.source) return;

      const context = getAudioContext();
      player.source = context.createMediaElementSource(player.audio);
      player.panner = context.createStereoPanner();

      player.source.connect(player.panner);
      player.panner.connect(masterGain);
    }

    function setPan(player, position) {
      if (!canUsePanning || !player.panner || !audioContext) return;

      const now = audioContext.currentTime;
      player.panner.pan.cancelScheduledValues(now);
      player.panner.pan.setValueAtTime(player.panner.pan.value, now);
      player.panner.pan.linearRampToValueAtTime(position, now + 0.4);
    }

    function updatePanning() {
      if (!canUsePanning) return;

      const active = [...players.values()].filter(
        (player) => !player.audio.paused
      );

      const count = active.length;

      if (count === 0) return;

      if (count === 1) {
        setPan(active[0], 0);
        return;
      }

      const spread = Math.min(count * 0.1, 0.9);

      active.forEach((player, index) => {
        const position = -spread + (index * (spread * 2)) / (count - 1);
        setPan(player, position);
      });
    }

    function setBirdButtonState(player, playing) {
      player.button.setAttribute('aria-pressed', String(playing));
      player.button.setAttribute('aria-label', player.birdName);
    }

    function setFullChoirState(active) {
      fullChoirActive = active;
      fullChoirButton.setAttribute('aria-pressed', String(active));
      fullChoirButton.setAttribute('aria-label', 'Full choir');
    }

    async function startPlayer(player) {
      connectPlayer(player);
      await player.audio.play();
      setBirdButtonState(player, true);
    }

    function stopPlayer(player) {
      player.audio.pause();
      player.audio.currentTime = 0;
      setBirdButtonState(player, false);
    }

    function applyVolume() {
      const percentage = Number(volumeSlider.value);
      const volume = percentage / 100;

      volumeValue.value = `${percentage}%`;
      volumeValue.textContent = `${percentage}%`;

      if (canUsePanning && masterGain && audioContext) {
        const now = audioContext.currentTime;
        masterGain.gain.cancelScheduledValues(now);
        masterGain.gain.setTargetAtTime(volume, now, 0.015);
      } else {
        players.forEach((player) => {
          player.audio.volume = volume;
        });
      }
    }

    volumeSlider.addEventListener('input', applyVolume);

    document.querySelectorAll('.bird-button[data-audio]').forEach((button) => {
      const audioPath = button.dataset.audio;
      const audio = new Audio(audioPath);
      const key = speciesKey(audioPath);
      const birdName = button.querySelector('.bird-name').textContent;

      audio.loop = true;
      audio.preload = 'auto';
      audio.volume = Number(volumeSlider.value) / 100;

      const player = {
        audio,
        source: null,
        panner: null,
        button,
        birdName
      };

      players.set(key, player);

      button.addEventListener('click', async () => {
        try {
          await resumeAudioContext();

          if (!player.audio.paused) {
            stopPlayer(player);
          } else {
            await startPlayer(player);
          }

          setFullChoirState(false);
          updatePanning();
        } catch (error) {
          setBirdButtonState(player, false);
          console.error(
            `${birdName} could not play. Check that ${audioPath} exists.`,
            error
          );
        }
      });

      audio.addEventListener('error', () => {
        console.error(
          `The audio file for ${birdName} was not found or is unsupported: ${audioPath}`
        );
      });
    });

    fullChoirButton.addEventListener('click', async () => {
      const allPlayers = [...players.values()];

      if (fullChoirActive) {
        allPlayers.forEach(stopPlayer);
        setFullChoirState(false);
        updatePanning();
        return;
      }

      try {
        await resumeAudioContext();

        allPlayers.forEach((player) => {
          player.audio.pause();
          player.audio.currentTime = 0;
          connectPlayer(player);
        });

        const results = await Promise.allSettled(
          allPlayers.map((player) => player.audio.play())
        );

        let startedCount = 0;

        results.forEach((result, index) => {
          const player = allPlayers[index];

          if (result.status === 'fulfilled') {
            setBirdButtonState(player, true);
            startedCount += 1;
          } else {
            setBirdButtonState(player, false);
            console.error(
              `${player.birdName} could not play. Check that ${player.button.dataset.audio} exists.`,
              result.reason
            );
          }
        });

        setFullChoirState(startedCount > 0);
        updatePanning();
      } catch (error) {
        setFullChoirState(false);
        console.error('The full choir could not start.', error);
      }
    });

    applyVolume();
  </script>

</body>
</html>
